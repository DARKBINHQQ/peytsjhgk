<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Com Monkeys</title>

<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

<meta name="theme-color" content="#0f0f0f" />
<meta name="description" content="Hall of vrchatians." />

<meta property="og:title" content="mewbin.org">
<meta property="og:description" content="Hall of vrchatians.">
<meta property="og:image" content="https://r2.gangmonkeys.com/gangmonkeys/gangmonkeys.png">
<meta property="og:url" content="https://mewbin.org">


<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="mewbin.org">
<meta name="twitter:description" content="Hall of vrchatians.">
<meta name="twitter:image" content="https://r2.gangmonkeys.com/gangmonkeys/gangmonkeys.png">
</head>

<body>

<div id="overlay" role="button" tabindex="0" aria-label="Enter site">
    <span>Click to Enter</span>
</div>

<img id="bgVideo" src="bgg.gif" alt="" aria-hidden="true">
<div class="blur-overlay"></div>

<header class="top-bar">

    <div class="logo">
        <img src="ComMonkeys.gif" alt="Com Monkeys">
    </div>

    <div class="controls">

        <div class="volume-control">
            <label for="volume-slider">
                <i class="fas fa-volume-up"></i>
            </label>
            <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search users or gangs..." />
        </div>

    </div>

</header>

<main>

    <section class="nav-buttons">
        <button onclick="navigate('/depot')">Depot</button>
        <button onclick="navigate('/archive')">Archive</button>
        <button onclick="navigate('/hoa')">HOA</button>
    </section>

    <section>
        <h2>Users</h2>
        <div id="userList" class="card-container"></div>
    </section>

    <section>
        <h2>Gangs</h2>
        <div id="gangList" class="card-container"></div>
    </section>

</main>

<a href="https://discord.gg/8eBkxXprpB" target="_blank" class="discord-logo" aria-label="Join Discord">
    <img src="/discord.png" alt="Discord">
</a>
    
<audio id="backgroundAudio" src="https://r2.gangmonkeys.com/gangmonkeys/Roi.ogg" loop></audio>


<div id="clock"></div>

<div id="timeCheckPopup">
    You should go to bed!
</div>

<script>
const overlay = document.getElementById("overlay");
const audio = document.getElementById("backgroundAudio");
const volumeSlider = document.getElementById("volume-slider");

overlay.addEventListener("click", enterSite);
overlay.addEventListener("keypress", (e) => {
    if (e.key === "Enter") enterSite();
});

function enterSite() {
    overlay.style.opacity = "0";
    setTimeout(() => overlay.style.display = "none", 500);
    audio.play().catch(() => {});
}


volumeSlider.addEventListener("input", () => {
    audio.volume = volumeSlider.value;
});


function navigate(path) {
    window.location.href = path;
}


function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
        now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

function checkTime() {
    const hour = new Date().getHours();
    const popup = document.getElementById("timeCheckPopup");

    if (hour >= 1 && hour <= 5) {
        popup.style.display = "block";
    } else {
        popup.style.display = "none";
    }
}
setInterval(checkTime, 60000);
checkTime();

</script>

</body>
</html>
